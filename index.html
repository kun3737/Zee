<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Management v50</title>
    <style>
        :root { --primary: #d32f2f; --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .folder { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; cursor: pointer; text-align: center; transition: 0.3s; position: relative; }
        .folder:hover { border-color: var(--primary); transform: translateY(-5px); }
        .folder::before { content: "📁"; font-size: 30px; display: block; margin-bottom: 5px; }
        .student-item { background: #222; padding: 15px; border-radius: 8px; margin: 10px 0; cursor: pointer; border-left: 5px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .content-area { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-top: 20px; display: none; }
        .active { display: block !important; }
        .profile-img { width: 150px; height: 150px; border-radius: 10px; object-fit: cover; border: 2px solid var(--primary); margin-bottom: 15px; }
        input, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
        button { background: var(--primary); border: none; font-weight: bold; cursor: pointer; }
        .back-btn { background: #333; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; border-bottom: 2px solid var(--primary); padding-bottom: 10px;">Elite Management v50</h2>

    <!-- MAIN FOLDERS -->
    <div id="mainDashboard">
        <div class="folder-grid">
            <div class="folder" onclick="openSection('regForm')">Add New Student</div>
            <div class="folder" onclick="fetchClasses()">View Classes</div>
        </div>
    </div>

    <!-- REGISTRATION -->
    <div id="regForm" class="content-area">
        <h3>Registration</h3>
        <input type="text" id="cl" placeholder="Class">
        <input type="text" id="ro" placeholder="Roll Number">
        <input type="text" id="na" placeholder="Student Name">
        <input type="text" id="fa" placeholder="Father Name">
        <input type="text" id="mo" placeholder="Mobile Number">
        <textarea id="ad" placeholder="Address"></textarea>
        <button onclick="saveStudent()">Save Student</button>
        <button class="back-btn" onclick="showMain()">Back</button>
    </div>

    <!-- CLASS LIST VIEW -->
    <div id="classListView" class="content-area">
        <h3>Available Classes</h3>
        <div id="classGrid" class="folder-grid"></div>
        <button class="back-btn" onclick="showMain()">Back</button>
    </div>

    <!-- STUDENT LIST VIEW -->
    <div id="studentListView" class="content-area">
        <h3 id="currentClassTitle">Students</h3>
        <div id="studentList"></div>
        <button class="back-btn" onclick="openSection('classListView')">Back to Classes</button>
    </div>

    <!-- STUDENT PROFILE VIEW -->
    <div id="profileView" class="content-area">
        <h3>Student Profile</h3>
        <div id="profileContent" style="text-align: center;"></div>
        <button class="back-btn" onclick="openSection('studentListView')">Back to List</button>
    </div>

</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfj21b6EmEs5OM7RvuyZOWhmTAY4tOPwZL3mVKWG0mI4-3P1vADdmWeBOGnK0k3fCs/exec";
    let allData = [];

    function showMain() {
        document.querySelectorAll('.content-area').forEach(d => d.classList.remove('active'));
        document.getElementById('mainDashboard').style.display = 'block';
    }

    function openSection(id) {
        document.getElementById('mainDashboard').style.display = 'none';
        document.querySelectorAll('.content-area').forEach(d => d.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 1. Fetch data and group by Class
    async function fetchClasses() {
        openSection('classListView');
        document.getElementById('classGrid').innerText = "Loading Classes...";
        
        const response = await fetch(SCRIPT_URL);
        allData = await response.json(); // Sheet data
        
        const classes = [...new Set(allData.map(item => item[0]))]; // Unique Classes
        const grid = document.getElementById('classGrid');
        grid.innerHTML = "";

        classes.forEach(cls => {
            if(cls === "Class") return; // Header skip
            let div = document.createElement('div');
            div.className = "folder";
            div.innerText = "Class " + cls;
            div.onclick = () => showStudents(cls);
            grid.appendChild(div);
        });
    }

    // 2. Show Students of a specific Class
    function showStudents(cls) {
        openSection('studentListView');
        document.getElementById('currentClassTitle').innerText = "Class " + cls + " Students";
        const list = document.getElementById('studentList');
        list.innerHTML = "";

        const filtered = allData.filter(item => item[0] === cls);
        filtered.forEach(stu => {
            let div = document.createElement('div');
            div.className = "student-item";
            div.innerHTML = `<span><b>Roll: ${stu[1]}</b> - ${stu[2]}</span> <span>➔</span>`;
            div.onclick = () => showProfile(stu);
            list.appendChild(div);
        });
    }

    // 3. Show Full Profile
    function showProfile(stu) {
        openSection('profileView');
        const content = document.getElementById('profileContent');
        const pic = stu[5] ? `<img src="${stu[5]}" class="profile-img">` : `<div style="padding:20px; background:#333; margin-bottom:10px;">No Photo Uploaded</div>`;
        
        content.innerHTML = `
            ${pic}
            <div style="text-align:left; background:#222; padding:15px; border-radius:10px;">
                <p><b>Name:</b> ${stu[2]}</p>
                <p><b>Father Name:</b> ${stu[3]}</p>
                <p><b>Roll No:</b> ${stu[1]}</p>
                <p><b>Mobile:</b> ${stu[4] || 'N/A'}</p>
                <p><b>Address:</b> ${stu[6] || 'N/A'}</p>
            </div>
        `;
    }

    async function saveStudent() {
        const data = {
            action: "register",
            class: document.getElementById('cl').value,
            roll: document.getElementById('ro').value,
            name: document.getElementById('na').value,
            father: document.getElementById('fa').value,
            mobile: document.getElementById('mo').value,
            address: document.getElementById('ad').value
        };
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
        .then(() => { alert("Student Saved!"); showMain(); });
    }
</script>
</body>
</html>
