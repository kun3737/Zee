<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Management v48 - Official</title>
    
    <!-- Firebase SDK (Zaroori Libraries) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        /* CSS: Design aur Layout */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #16213e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #4ecca3; text-transform: uppercase; letter-spacing: 2px; }
        
        .form-section { background: #0f3460; padding: 20px; border-radius: 10px; margin-bottom: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        input { padding: 12px; border: none; border-radius: 5px; background: #e9ecef; color: #333; font-weight: bold; }
        
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .add-btn { background: #4ecca3; color: #1a1a2e; }
        .add-btn:hover { background: #45b391; }
        .sync-btn { background: #e94560; color: white; width: 100%; margin-top: 20px; font-size: 16px; }

        .student-list { margin-top: 20px; }
        .student-card { background: #1a1a2e; border-left: 5px solid #4ecca3; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 20px; border-radius: 0 10px 10px 0; }
        .student-pic { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #4ecca3; object-fit: cover; }
        .info { flex-grow: 1; }
        .info h4 { margin: 0; color: #4ecca3; font-size: 18px; }
        .marks-tag { font-size: 14px; background: #0f3460; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; }
        .delete-btn { background: #ff4d4d; color: white; padding: 8px 12px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Elite Management v48</h2>
    
    <!-- Input Fields -->
    <div class="form-section">
        <input type="text" id="cls" placeholder="Class (e.g. 10th)">
        <input type="text" id="roll" placeholder="Roll Number">
        <input type="number" id="t-marks" placeholder="Total Marks">
        <input type="number" id="o-marks" placeholder="Obtained Marks">
        <button class="add-btn" onclick="addStudent()">Add Student</button>
    </div>

    <div id="display-area" class="student-list">
        <!-- Students yahan show honge -->
    </div>

    <button class="sync-btn" onclick="syncWithCloud()">Save & Sync to Cloud ☁️</button>
</div>

<script>
    // JavaScript: Logic aur Firebase Connection
    const firebaseConfig = {
        apiKey: "AIzaSyBAmI0iETjOAVygeMfLho4Yp0qWhV9P1XI",
        authDomain: "elite-management-58a3f.firebaseapp.com",
        databaseURL: "https://elite-management-58a3f-default-rtdb.firebaseio.com",
        projectId: "elite-management-58a3f",
        storageBucket: "elite-management-58a3f.firebasestorage.app",
        messagingSenderId: "250529182768",
        appId: "1:250529182768:web:3f260a155c1dbbf9a969f5"
    };

    firebase.initializeApp(firebaseConfig);
    const db_cloud = firebase.database().ref('Elite_System');
    let db = {};

    // 1. Cloud se data khinchna
    function loadData() {
        db_cloud.on('value', (snapshot) => {
            if(snapshot.exists()) {
                db = snapshot.val();
                render();
            }
        });
    }

    // 2. Naya Student add karna
    function addStudent() {
        const cls = document.getElementById('cls').value;
        const roll = document.getElementById('roll').value;
        const tm = document.getElementById('t-marks').value;
        const om = document.getElementById('o-marks').value;

        if(!cls || !roll) { alert("Class aur Roll No zaroori hain!"); return; }

        if(!db[cls]) db[cls] = {};
        db[cls][roll] = { 
            total: tm || "0", 
            obtained: om || "0", 
            pic: "" 
        };
        render();
    }

    // 3. Screen par data dikhana
    function render() {
        const area = document.getElementById('display-area');
        area.innerHTML = "";
        
        for(let cls in db) {
            for(let roll in db[cls]) {
                const s = db[cls][roll];
                area.innerHTML += `
                    <div class="student-card">
                        <img src="${s.pic || 'https://via.placeholder.com/70'}" class="student-pic">
                        <div class="info">
                            <h4>Roll No: ${roll} (Class: ${cls})</h4>
                            <div class="marks-tag">Marks: <b>${s.obtained}</b> / ${s.total}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteStudent('${cls}','${roll}')">Remove</button>
                    </div>`;
            }
        }
    }

    // 4. Student Delete karna
    function deleteStudent(cls, roll) {
        if(confirm("Delete kar dein?")) {
            delete db[cls][roll];
            render();
        }
    }

    // 5. Cloud par save karna
    function syncWithCloud() {
        db_cloud.set(db).then(() => {
            alert("Data successfully synced with Firebase! ✅");
        });
    }

    // Page khulte hi data load karo
    window.onload = loadData;
</script>

</body>
</html>
