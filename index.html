<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Admin v48 | Safe Edition</title>
    <style>
        :root { --primary: #4ecca3; --bg: #1a1a2e; --card: #16213e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; }
        
        #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .lock-box { background: var(--card); padding: 40px; border-radius: 15px; border: 2px solid var(--primary); text-align: center; }

        .folder-nav { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .tab-btn { background: var(--card); border: 1px solid var(--primary); color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { background: var(--primary); color: #1a1a2e; font-weight: bold; }

        .content-folder { display: none; max-width: 900px; margin: auto; background: var(--card); padding: 25px; border-radius: 12px; }
        .content-folder.active { display: block; }

        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #0f3460; border: 1px solid #2d3436; color: white; border-radius: 6px; box-sizing: border-box; }
        .save-btn { background: var(--primary); color: #1a1a2e; padding: 15px; width: 100%; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .student-item { background: #0f3460; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <h2>Elite Admin</h2>
        <input type="password" id="pass-input" placeholder="Password">
        <button class="save-btn" onclick="unlock()">Unlock</button>
    </div>
</div>

<div class="folder-nav">
    <button class="tab-btn active" onclick="openTab('reg-folder')">📁 Registration</button>
    <button class="tab-btn" onclick="openTab('result-folder')">📊 Results</button>
    <button class="tab-btn" onclick="openTab('link-folder')">🔗 External Portal</button>
    <button class="tab-btn" onclick="openTab('delete-folder')">🗑️ Delete</button>
</div>

<div class="container">
    <!-- Registration -->
    <div id="reg-folder" class="content-folder active">
        <h3>Student Registration (Local)</h3>
        <input type="text" id="s-name" placeholder="Name">
        <input type="text" id="s-father" placeholder="Father Name">
        <input type="text" id="s-class" placeholder="Class">
        <input type="text" id="s-roll" placeholder="Roll No">
        <input type="text" id="s-phone" placeholder="Phone">
        <textarea id="s-addr" placeholder="Address"></textarea>
        <button class="save-btn" onclick="saveLocally()">Save Student</button>
    </div>

    <!-- Results -->
    <div id="result-folder" class="content-folder">
        <h3>Add Marks</h3>
        <input type="text" id="r-class" placeholder="Class">
        <input type="text" id="r-roll" placeholder="Roll No">
        <input type="number" id="r-total" placeholder="Total Marks">
        <input type="number" id="r-ob" placeholder="Obtained Marks">
        <button class="save-btn" onclick="saveMarks()">Update Marks</button>
    </div>

    <!-- External Link -->
    <div id="link-folder" class="content-folder">
        <h3>External Student Portal</h3>
        <p>Aap aik separate website (e.g. Google Form ya koi dusri free site) yahan link kar sakte hain:</p>
        <input type="text" id="ext-link" placeholder="Paste your second website link here">
        <button class="save-btn" onclick="saveLink()">Save Portal Link</button>
        <div id="current-link" style="margin-top:20px; color:var(--primary)"></div>
    </div>

    <!-- Delete -->
    <div id="delete-folder" class="content-folder">
        <h3>Records</h3>
        <div id="list-area"></div>
    </div>
</div>

<script>
    let students = JSON.parse(localStorage.getItem('elite_data')) || {};

    function unlock() {
        if(document.getElementById('pass-input').value === "elite786") {
            document.getElementById('lock-screen').style.display = 'none';
        } else { alert("Wrong!"); }
    }

    function openTab(id) {
        document.querySelectorAll('.content-folder').forEach(f => f.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'delete-folder') showList();
    }

    function saveLocally() {
        const c = document.getElementById('s-class').value;
        const r = document.getElementById('s-roll').value;
        if(!students[c]) students[c] = {};
        students[c][r] = {
            name: document.getElementById('s-name').value,
            father: document.getElementById('s-father').value,
            phone: document.getElementById('s-phone').value,
            addr: document.getElementById('s-addr').value
        };
        localStorage.setItem('elite_data', JSON.stringify(students));
        alert("Saved to Local Storage!");
    }

    function showList() {
        let html = "";
        for(let c in students) {
            for(let r in students[c]) {
                html += `<div class="student-item">
                    <span>${students[c][r].name} (Roll: ${r})</span>
                    <button onclick="del('${c}','${r}')" style="color:red">Delete</button>
                </div>`;
            }
        }
        document.getElementById('list-area').innerHTML = html;
    }

    function del(c, r) {
        delete students[c][r];
        localStorage.setItem('elite_data', JSON.stringify(students));
        showList();
    }

    function saveLink() {
        const link = document.getElementById('ext-link').value;
        localStorage.setItem('portal_link', link);
        document.getElementById('current-link').innerText = "Active Portal: " + link;
    }
</script>
</body>
</html>
