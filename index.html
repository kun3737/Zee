<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Management - All-in-One</title>
    <style>
        :root { --primary: #d32f2f; --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.7); text-align: center; }
        h2 { margin-top: 0; color: #fff; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; box-sizing: border-box; font-size: 16px; }
        input { background: #222; color: white; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b71c1c; }
        .hidden { display: none; }
        .back-btn { background: transparent; border: 1px solid #444; margin-top: 20px; }
        #status { font-size: 14px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Elite Management v48</h2>

    <!-- MAIN SELECTION -->
    <div id="mainMenu">
        <p>Select your portal to continue:</p>
        <button onclick="showSection('adminLogin')">Admin Dashboard</button>
        <button onclick="showSection('studentPortal')" style="background: #2e7d32;">Student Photo Portal</button>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="adminLogin" class="hidden">
        <h3>Admin Access</h3>
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button onclick="checkAdmin()">Login as Admin</button>
        <button class="back-btn" onclick="showSection('mainMenu')">Back</button>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div id="adminDash" class="hidden">
        <h3>Admin Dashboard</h3>
        <input type="text" id="clR" placeholder="Class">
        <input type="text" id="roR" placeholder="Roll No">
        <input type="text" id="naR" placeholder="Student Name">
        <input type="text" id="faR" placeholder="Father Name">
        <input type="text" id="paR" placeholder="Assign Password">
        <button onclick="apiCall('register')">Register Student</button>
        <button onclick="apiCall('delete')" style="background: #000; border: 1px solid red; color: red;">🗑️ Wipe All Data</button>
        <button class="back-btn" onclick="showSection('mainMenu')">Logout</button>
    </div>

    <!-- STUDENT PORTAL -->
    <div id="studentPortal" class="hidden">
        <h3>Student Portal</h3>
        <input type="text" id="clS" placeholder="Your Class">
        <input type="text" id="roS" placeholder="Your Roll Number">
        <input type="file" id="phS" accept="image/*">
        <button onclick="apiCall('uploadPhoto')" id="upBtn">Upload & Save Photo</button>
        <button class="back-btn" onclick="showSection('mainMenu')">Back</button>
    </div>

    <div id="status"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfj21b6EmEs5OM7RvuyZOWhmTAY4tOPwZL3mVKWG0mI4-3P1vADdmWeBOGnK0k3fCs/exec";

    function showSection(id) {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('adminLogin').classList.add('hidden');
        document.getElementById('adminDash').classList.add('hidden');
        document.getElementById('studentPortal').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('status').innerText = "";
    }

    function checkAdmin() {
        if(document.getElementById('adminPass').value === "elite786") {
            showSection('adminDash');
        } else { alert("Wrong Admin Password!"); }
    }

    async function apiCall(action) {
        const status = document.getElementById('status');
        let data = { action: action };

        if (action === 'register') {
            data.class = document.getElementById('clR').value;
            data.roll = document.getElementById('roR').value;
            data.name = document.getElementById('naR').value;
            data.father = document.getElementById('faR').value;
            data.pass = document.getElementById('paR').value;
            if(!data.roll || !data.name) return alert("Fill details!");
        }

        if (action === 'uploadPhoto') {
            const file = document.getElementById('phS').files[0];
            if(!file) return alert("Select photo!");
            status.innerText = "Processing...";
            const reader = new FileReader();
            reader.onload = function(e) {
                data.class = document.getElementById('clS').value;
                data.roll = document.getElementById('roS').value;
                data.image = e.target.result;
                sendRequest(data);
            };
            reader.readAsDataURL(file);
            return;
        }

        if (action === 'delete') {
            if(!confirm("Wipe everything?")) return;
        }

        sendRequest(data);
    }

    function sendRequest(data) {
        document.getElementById('status').innerText = "Sending to Server...";
        fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
        .then(() => {
            document.getElementById('status').innerHTML = "✅ Action Completed!";
            if(data.action === 'uploadPhoto') document.getElementById('upBtn').disabled = true;
        });
    }
</script>
</body>
</html>
