<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Management v54</title>
    <style>
        :root { --primary: #d32f2f; --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* Folder Style UI */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .folder { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #333; cursor: pointer; text-align: center; transition: 0.3s; }
        .folder:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(211,47,47,0.3); }
        .folder::before { content: "📁"; font-size: 40px; display: block; margin-bottom: 10px; }
        
        /* Sections */
        .section { display: none; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; margin-top: 20px; }
        .active { display: block !important; }
        
        input, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        button { background: var(--primary); border: none; font-weight: bold; cursor: pointer; }
        .back-btn { background: #333; margin-top: 15px; }
        
        /* Table for Multiple Deleting */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        th { background: #222; }
        .profile-img { width: 100px; height: 100px; border-radius: 8px; object-fit: cover; border: 2px solid var(--primary); }
    </style>
</head>
<body>

<!-- 1. Password System -->
<div id="loginArea" style="display: flex; height: 100vh; justify-content: center; align-items: center; background: #000; position: fixed; width: 100%; top: 0; left: 0; z-index: 100;">
    <div style="background: #111; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #333;">
        <h2>Elite Admin Access</h2>
        <input type="password" id="adminPass" placeholder="Enter Password">
        <button onclick="login()">Enter Dashboard</button>
    </div>
</div>

<div class="container" id="mainApp" style="display:none;">
    <h1 style="text-align:center; border-bottom: 2px solid var(--primary); padding-bottom: 15px;">Elite Management v54</h1>

    <!-- 2. Folder Navigation -->
    <div class="folder-grid" id="grid">
        <div class="folder" onclick="showSec('reg')">Student Registration</div>
        <div class="folder" onclick="showSec('list'); renderList();">All Folders (List)</div>
        <div class="folder" onclick="showSec('banner')">Banner Pic</div>
        <div class="folder" onclick="showSec('result')">Result Card</div>
    </div>

    <!-- 3. Student Registration Folder -->
    <div id="reg" class="section">
        <h3>📂 Create Student Record</h3>
        <input type="text" id="cl" placeholder="Class">
        <input type="text" id="ro" placeholder="Roll Number">
        <input type="text" id="na" placeholder="Full Name">
        <input type="text" id="fa" placeholder="Father Name">
        <input type="text" id="mo" placeholder="Mobile Number">
        <textarea id="ad" placeholder="Home Address"></textarea>
        <button onclick="saveData()">Save to System</button>
        <button class="back-btn" onclick="hideSec()">Back</button>
    </div>

    <!-- 4. Multiple Deleting & List -->
    <div id="list" class="section">
        <h3>📋 Student Database</h3>
        <button onclick="deleteSelected()" style="background: #000; color: red; border: 1px solid red; margin-bottom: 10px;">🗑️ Delete Selected</button>
        <table id="studentTable">
            <thead>
                <tr>
                    <th><input type="checkbox" onclick="selectAll(this)"></th>
                    <th>Roll</th>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <button class="back-btn" onclick="hideSec()">Back</button>
    </div>

    <!-- 5. Banner & Media Folder -->
    <div id="banner" class="section">
        <h3>🖼️ System Banner</h3>
        <input type="file" id="bInput" accept="image/*">
        <button onclick="alert('Banner updated locally!')">Set Banner</button>
        <button class="back-btn" onclick="hideSec()">Back</button>
    </div>

    <!-- 6. Result Card Folder -->
    <div id="result" class="section">
        <h3>📊 Result Cards</h3>
        <p>Student ke details yahan se result card format mein dekhein.</p>
        <input type="text" id="sRoll" placeholder="Search Roll Number">
        <button onclick="alert('Result Card Feature Ready!')">Generate Card</button>
        <button class="back-btn" onclick="hideSec()">Back</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('elite_v54')) || [];

    function login() {
        if(document.getElementById('adminPass').value === "elite786") {
            document.getElementById('loginArea').style.display = "none";
            document.getElementById('mainApp').style.display = "block";
        } else { alert("Ghalat Password!"); }
    }

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('grid').style.display = 'none';
    }

    function hideSec() {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('grid').style.display = 'grid';
    }

    function saveData() {
        const stu = {
            id: Date.now(),
            class: document.getElementById('cl').value,
            roll: document.getElementById('ro').value,
            name: document.getElementById('na').value,
            father: document.getElementById('fa').value,
            mobile: document.getElementById('mo').value,
            address: document.getElementById('ad').value
        };
        db.push(stu);
        localStorage.setItem('elite_v54', JSON.stringify(db));
        alert("Record Saved!");
        hideSec();
    }

    function renderList() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = db.map(s => `
            <tr>
                <td><input type="checkbox" class="del-check" data-id="${s.id}"></td>
                <td>${s.roll}</td>
                <td>${s.name}</td>
                <td>${s.class}</td>
                <td><button onclick="viewStu(${s.id})" style="padding:5px;">👁️</button></td>
            </tr>
        `).join('');
    }

    function selectAll(source) {
        document.querySelectorAll('.del-check').forEach(c => c.checked = source.checked);
    }

    function deleteSelected() {
        const idsToDelete = Array.from(document.querySelectorAll('.del-check:checked')).map(c => parseInt(c.getAttribute('data-id')));
        if(confirm("Selected records delete kar doon?")) {
            db = db.filter(s => !idsToDelete.includes(s.id));
            localStorage.setItem('elite_v54', JSON.stringify(db));
            renderList();
        }
    }
</script>
</body>
</html>
