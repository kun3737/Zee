<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Management v52 - Dynamic Folders</title>
    <style>
        :root { --primary: #d32f2f; --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* Folder Look */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 20px; }
        .folder { background: var(--card); padding: 25px 15px; border-radius: 12px; border: 1px solid #333; cursor: pointer; text-align: center; transition: 0.3s; position: relative; }
        .folder:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(211, 47, 47, 0.2); }
        .folder::before { content: "📁"; font-size: 40px; display: block; margin-bottom: 10px; }
        
        /* Content Areas */
        .section { display: none; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; margin-top: 20px; }
        .active { display: block !important; }
        
        /* Student Profile Card */
        .profile-header { display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        .profile-pic { width: 120px; height: 120px; border-radius: 10px; object-fit: cover; border: 2px solid var(--primary); background: #222; }
        
        input, button, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        button { background: var(--primary); border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .back-btn { background: #333; margin-top: 20px; }
        .loader { text-align: center; padding: 20px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: #fff; margin-bottom: 30px;">Elite Management Dashboard</h1>

    <!-- MAIN DASHBOARD -->
    <div id="mainMenu">
        <div class="folder-grid">
            <div class="folder" onclick="showSection('regForm')">Add New Student</div>
            <div class="folder" onclick="loadClasses()">Class Folders</div>
            <div class="folder" onclick="window.open('https://script.google.com/home', '_blank')">Database (Sheets)</div>
        </div>
    </div>

    <!-- REGISTRATION FORM -->
    <div id="regForm" class="section">
        <h3>📂 Create New Student Folder</h3>
        <input type="text" id="cl" placeholder="Class Name">
        <input type="text" id="ro" placeholder="Roll Number">
        <input type="text" id="na" placeholder="Student Full Name">
        <input type="text" id="fa" placeholder="Father Name">
        <input type="text" id="mo" placeholder="Mobile Number">
        <textarea id="ad" placeholder="Home Address"></textarea>
        <button onclick="saveStudent()">Register & Create Folder</button>
        <button class="back-btn" onclick="backToMain()">Cancel</button>
    </div>

    <!-- CLASS FOLDERS VIEW -->
    <div id="classView" class="section">
        <h3>📁 All Classes</h3>
        <div id="classGrid" class="folder-grid"></div>
        <button class="back-btn" onclick="backToMain()">Back to Dashboard</button>
    </div>

    <!-- STUDENT LIST (Inside Class Folder) -->
    <div id="studentListView" class="section">
        <h3 id="classTitle">Class Folder</h3>
        <div id="studentGrid" class="folder-grid"></div>
        <button class="back-btn" onclick="showSection('classView')">Back to Classes</button>
    </div>

    <!-- STUDENT PROFILE (Final Folder Content) -->
    <div id="profileView" class="section">
        <h3>👤 Student Detailed Profile</h3>
        <div id="profileData"></div>
        <button class="back-btn" onclick="showSection('studentListView')">Back to Students</button>
    </div>

</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfj21b6EmEs5OM7RvuyZOWhmTAY4tOPwZL3mVKWG0mI4-3P1vADdmWeBOGnK0k3fCs/exec";
    let database = [];

    function showSection(id) {
        document.getElementById('mainMenu').style.display = 'none';
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function backToMain() {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('mainMenu').style.display = 'block';
    }

    // 1. Save Student to Sheets (Background)
    async function saveStudent() {
        const btn = event.target;
        btn.innerText = "Creating Folder...";
        btn.disabled = true;

        const data = {
            action: "register",
            class: document.getElementById('cl').value,
            roll: document.getElementById('ro').value,
            name: document.getElementById('na').value,
            father: document.getElementById('fa').value,
            mobile: document.getElementById('mo').value,
            address: document.getElementById('ad').value
        };

        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
        alert("Folder Created Successfully!");
        location.reload();
    }

    // 2. Fetch Classes and Render as Folders
    async function loadClasses() {
        showSection('classView');
        const grid = document.getElementById('classGrid');
        grid.innerHTML = "<div class='loader'>Scanning Database...</div>";

        const response = await fetch(SCRIPT_URL);
        database = await response.json();
        
        // Filter unique classes
        const classes = [...new Set(database.map(s => s[0]))].filter(c => c !== "Class");
        grid.innerHTML = "";

        classes.forEach(cls => {
            const div = document.createElement('div');
            div.className = "folder";
            div.innerText = "Class " + cls;
            div.onclick = () => loadStudents(cls);
            grid.appendChild(div);
        });
    }

    // 3. Render Student Folders inside Class
    function loadStudents(cls) {
        showSection('studentListView');
        document.getElementById('classTitle').innerText = "📂 Class " + cls + " Folders";
        const grid = document.getElementById('studentGrid');
        grid.innerHTML = "";

        const classStudents = database.filter(s => s[0] === cls);
        classStudents.forEach(stu => {
            const div = document.createElement('div');
            div.className = "folder";
            div.style.fontSize = "14px";
            div.innerText = stu[2]; // Student Name
            div.onclick = () => openProfile(stu);
            grid.appendChild(div);
        });
    }

    // 4. Final Profile View
    function openProfile(stu) {
        showSection('profileView');
        const area = document.getElementById('profileData');
        const photo = stu[5] ? `<img src="${stu[5]}" class="profile-pic">` : `<div class="profile-pic" style="display:flex; align-items:center; justify-content:center; font-size:12px; text-align:center;">No Image Uploaded</div>`;
        
        area.innerHTML = `
            <div class="profile-header">
                ${photo}
                <div>
                    <h2 style="margin:0;">${stu[2]}</h2>
                    <p style="color:var(--primary); margin:5px 0;">Roll No: ${stu[1]}</p>
                </div>
            </div>
            <div style="background:#222; padding:20px; border-radius:10px; text-align:left; line-height:1.6;">
                <p><b>Father Name:</b> ${stu[3]}</p>
                <p><b>Class:</b> ${stu[0]}</p>
                <p><b>Mobile:</b> ${stu[4] || 'Not Set'}</p>
                <p><b>Address:</b> ${stu[6] || 'Not Set'}</p>
            </div>
        `;
    }
</script>
</body>
</html>
