<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Management - Offline Folder System</title>
    <style>
        :root { --primary: #d32f2f; --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        
        /* Folder Graphics */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .folder { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; cursor: pointer; text-align: center; transition: 0.3s; position: relative; }
        .folder:hover { border-color: var(--primary); transform: translateY(-3px); }
        .folder::before { content: "📁"; font-size: 35px; display: block; margin-bottom: 8px; }
        
        /* UI Components */
        .section { display: none; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-top: 20px; }
        .active { display: block !important; }
        input, button, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        button { background: var(--primary); border: none; font-weight: bold; cursor: pointer; }
        .back-btn { background: #333; margin-top: 15px; }
        
        .profile-img { width: 120px; height: 120px; border-radius: 10px; object-fit: cover; border: 2px solid var(--primary); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; border-bottom: 2px solid var(--primary); padding-bottom: 10px;">Elite Management v53</h2>

    <!-- MAIN DASHBOARD -->
    <div id="mainDashboard">
        <div class="folder-grid">
            <div class="folder" onclick="showSection('regForm')">Add Student</div>
            <div class="folder" onclick="renderClasses()">Class Folders</div>
            <div class="folder" onclick="clearAllData()" style="color: red;">Wipe All</div>
        </div>
    </div>

    <!-- REGISTRATION (Creating Local Folder) -->
    <div id="regForm" class="section">
        <h3>📂 Create Student Folder</h3>
        <input type="text" id="cl" placeholder="Class">
        <input type="text" id="ro" placeholder="Roll Number">
        <input type="text" id="na" placeholder="Student Name">
        <input type="text" id="fa" placeholder="Father Name">
        <input type="text" id="mo" placeholder="Mobile Number">
        <textarea id="ad" placeholder="Address"></textarea>
        <p style="font-size: 12px; color: #888;">Note: Ye data sirf isi browser mein save hoga.</p>
        <button onclick="saveToLocal()">Create & Save</button>
        <button class="back-btn" onclick="goBack()">Back</button>
    </div>

    <!-- CLASSES VIEW -->
    <div id="classListView" class="section">
        <h3>📁 All Class Folders</h3>
        <div id="classGrid" class="folder-grid"></div>
        <button class="back-btn" onclick="goBack()">Back</button>
    </div>

    <!-- STUDENT LIST VIEW -->
    <div id="studentListView" class="section">
        <h3 id="classTitle">Students</h3>
        <div id="studentGrid" class="folder-grid"></div>
        <button class="back-btn" onclick="showSection('classListView')">Back to Classes</button>
    </div>

    <!-- PROFILE VIEW -->
    <div id="profileView" class="section">
        <h3>👤 Student Folder Content</h3>
        <div id="profileContent" style="text-align: center;"></div>
        <button class="back-btn" onclick="showSection('studentListView')">Back</button>
    </div>
</div>

<script>
    // Data Storage Logic
    let eliteData = JSON.parse(localStorage.getItem('elite_management_db')) || [];

    function goBack() {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('mainDashboard').style.display = 'block';
    }

    function showSection(id) {
        document.getElementById('mainDashboard').style.display = 'none';
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 1. Save Data Internally
    function saveToLocal() {
        const student = {
            class: document.getElementById('cl').value,
            roll: document.getElementById('ro').value,
            name: document.getElementById('na').value,
            father: document.getElementById('fa').value,
            mobile: document.getElementById('mo').value,
            address: document.getElementById('ad').value,
            pic: "" // Empty initially
        };

        if(!student.class || !student.roll) return alert("Class aur Roll No zaroori hain!");

        eliteData.push(student);
        localStorage.setItem('elite_management_db', JSON.stringify(eliteData));
        alert("Student Folder Created!");
        goBack();
    }

    // 2. Render Classes as Folders
    function renderClasses() {
        showSection('classListView');
        const grid = document.getElementById('classGrid');
        grid.innerHTML = "";
        
        const classes = [...new Set(eliteData.map(s => s.class))];
        classes.forEach(cls => {
            let div = document.createElement('div');
            div.className = "folder";
            div.innerText = "Class " + cls;
            div.onclick = () => renderStudents(cls);
            grid.appendChild(div);
        });
    }

    // 3. Render Students inside Class Folder
    function renderStudents(cls) {
        showSection('studentListView');
        document.getElementById('classTitle').innerText = "📂 Class " + cls;
        const grid = document.getElementById('studentGrid');
        grid.innerHTML = "";

        const filtered = eliteData.filter(s => s.class === cls);
        filtered.forEach(stu => {
            let div = document.createElement('div');
            div.className = "folder";
            div.style.fontSize = "13px";
            div.innerText = stu.name;
            div.onclick = () => showProfile(stu);
            grid.appendChild(div);
        });
    }

    // 4. Show Full Profile (Folder Content)
    function showProfile(stu) {
        showSection('profileView');
        const content = document.getElementById('profileContent');
        content.innerHTML = `
            <div style="background:#222; padding:20px; border-radius:15px; text-align:left;">
                <p><b>Student Name:</b> ${stu.name}</p>
                <p><b>Father Name:</b> ${stu.father}</p>
                <p><b>Roll Number:</b> ${stu.roll}</p>
                <p><b>Mobile:</b> ${stu.mobile}</p>
                <p><b>Address:</b> ${stu.address}</p>
            </div>
        `;
    }

    function clearAllData() {
        if(confirm("Kya aap waqai sara data mita kar folders khali karna chahte hain?")) {
            localStorage.removeItem('elite_management_db');
            location.reload();
        }
    }
</script>
</body>
</html>
